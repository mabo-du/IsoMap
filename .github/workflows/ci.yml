name: CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: uv pip install -e ".[dev]" --system
      
    - name: Run pytest
      run: pytest tests/
    
  ui-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: 18
        
    - name: Install dependencies
      working-directory: ./ui
      run: npm install
      
    - name: Build UI
      working-directory: ./ui
      run: npm run build
      
    - name: Install Playwright Browsers
      working-directory: ./ui
      run: npx playwright install --with-deps chromium
      
    - name: Run E2E tests
      working-directory: ./ui
      run: npx playwright test
